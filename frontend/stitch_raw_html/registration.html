<body class="bg-background text-on-background min-h-screen flex antialiased">
<!-- Left Side: Neural Background & Branding (55%) -->
<div class="hidden lg:flex lg:w-[55%] relative overflow-hidden bg-surface-dim items-center justify-center">
<!-- Abstract Neural Constellation Background Simulation -->
<div class="absolute inset-0 z-0">

<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/20 rounded-full blur-[100px] mix-blend-screen"></div>
<div class="absolute bottom-1/3 right-1/4 w-80 h-80 bg-tertiary/20 rounded-full blur-[80px] mix-blend-screen"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full bg-[radial-gradient(ellipse_at_center,rgba(67,136,253,0.1)_0%,rgba(12,14,20,1)_70%)]"></div>

</div>
<!-- Branding Content -->
<div class="relative z-10 text-center max-w-2xl px-8">
<h1 class="font-display text-[3.5rem] leading-tight font-extrabold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-primary to-tertiary mb-6">
                SkillLens
            </h1>
<p class="font-headline text-[1.5rem] font-medium text-on-surface-variant tracking-tight">
                AI-Powered Skill Intelligence
            </p>
</div>
</div>
<!-- Right Side: Registration Form (45%) -->
<div class="w-full lg:w-[45%] flex items-center justify-center p-8 sm:p-12 lg:p-16 bg-surface-container-lowest relative z-10">
<!-- Form Card -->
<div class="w-full max-w-md bg-surface-container rounded-xl p-8 ghost-border shadow-[0_32px_64px_-16px_rgba(67,136,253,0.06)]">
<div class="mb-10 text-center">
<h2 class="font-headline text-[1.5rem] font-medium text-on-surface mb-2">Create Account</h2>
<p class="font-body text-[0.875rem] text-on-surface-variant">Join the Neural Lens ecosystem.</p>
</div>
<form class="space-y-6">
<!-- Full Name Input -->
<div class="space-y-2">
<label class="block font-label text-[0.75rem] tracking-[0.05em] uppercase text-on-surface-variant" for="fullName">Full Name</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-4 text-on-surface-variant">
<span class="material-symbols-outlined text-[1.25rem]">person</span>
</span>
<input class="w-full pl-12 pr-4 py-3 bg-surface-container-highest border border-outline-variant/15 rounded-lg text-on-surface font-body text-[0.875rem] focus:outline-none focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all placeholder:text-on-surface-variant/50" id="fullName" name="fullName" placeholder="Jane Doe" type="text"/>
</div>
</div>
<!-- Email Input -->
<div class="space-y-2">
<label class="block font-label text-[0.75rem] tracking-[0.05em] uppercase text-on-surface-variant" for="email">Email</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-4 text-on-surface-variant">
<span class="material-symbols-outlined text-[1.25rem]">mail</span>
</span>
<input class="w-full pl-12 pr-4 py-3 bg-surface-container-highest border border-outline-variant/15 rounded-lg text-on-surface font-body text-[0.875rem] focus:outline-none focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all placeholder:text-on-surface-variant/50" id="email" name="email" placeholder="jane@example.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<label class="block font-label text-[0.75rem] tracking-[0.05em] uppercase text-on-surface-variant" for="password">Password</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-4 text-on-surface-variant">
<span class="material-symbols-outlined text-[1.25rem]">lock</span>
</span>
<input class="w-full pl-12 pr-12 py-3 bg-surface-container-highest border border-outline-variant/15 rounded-lg text-on-surface font-body text-[0.875rem] focus:outline-none focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all placeholder:text-on-surface-variant/50" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 flex items-center pr-4 text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[1.25rem]">visibility_off</span>
</button>
</div>
<!-- Strength Indicator (Static for visual) -->
<div class="flex gap-1 mt-2">
<div class="h-1 flex-1 bg-tertiary rounded-full"></div>
<div class="h-1 flex-1 bg-tertiary rounded-full"></div>
<div class="h-1 flex-1 bg-surface-variant rounded-full"></div>
<div class="h-1 flex-1 bg-surface-variant rounded-full"></div>
</div>
<p class="font-label text-[0.75rem] text-on-surface-variant mt-1 text-right">Medium Strength</p>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-3 pt-2">
<div class="flex items-center h-5">
<input class="w-4 h-4 rounded border-outline-variant/30 bg-surface-container-highest text-primary focus:ring-primary/50 focus:ring-offset-surface-container" id="terms" type="checkbox"/>
</div>
<label class="font-body text-[0.875rem] text-on-surface-variant leading-tight" for="terms">
                        I agree to the <a class="text-primary hover:text-primary-fixed transition-colors" href="#">Terms &amp; Conditions</a> and <a class="text-primary hover:text-primary-fixed transition-colors" href="#">Privacy Policy</a>
</label>
</div>
<!-- Submit Button -->
<button class="w-full py-4 bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline text-[1rem] font-semibold rounded-xl hover:shadow-[0_0_20px_rgba(67,136,253,0.4)] transition-all duration-300 transform hover:-translate-y-0.5" type="submit">
                    Create Account
                </button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/20"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-4 bg-surface-container font-label text-[0.75rem] tracking-[0.05em] uppercase text-on-surface-variant">Or register with</span>
</div>
</div>
<!-- OAuth Buttons -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 px-4 border border-outline-variant/20 rounded-lg text-on-surface hover:bg-surface-variant/50 transition-colors font-body text-[0.875rem]" type="button">

<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Google
                </button>
<button class="flex items-center justify-center gap-2 py-3 px-4 border border-outline-variant/20 rounded-lg text-on-surface hover:bg-surface-variant/50 transition-colors font-body text-[0.875rem]" type="button">
<svg aria-hidden="true" class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
<path clip-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" fill-rule="evenodd"></path>

<!-- Sign In Link -->
<div class="mt-8 text-center">
<p class="font-body text-[0.875rem] text-on-surface-variant">
