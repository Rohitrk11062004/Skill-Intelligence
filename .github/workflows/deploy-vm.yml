name: CI and Deploy to VM

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Backend dependency install + import check
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m compileall app

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend build check
        working-directory: frontend
        run: |
          npm ci
          npm run build

  deploy:
    runs-on: self-hosted
    needs: ci
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy on self-hosted runner
        run: |
          set -e
          cd "${{ secrets.VM_DEPLOY_PATH }}"
          git pull --ff-only origin main
          export COMPOSE_PROJECT_NAME=skill-intelligence
          docker compose -f docker-compose.prod.yml up -d --build
          docker compose -f docker-compose.prod.yml ps
          # API can take a few seconds to boot after container recreate; retry health check.
          for i in $(seq 1 20); do
            if docker compose -f docker-compose.prod.yml exec -T api sh -c "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5); print('ok')\""; then
              exit 0
            fi
            echo "Health check attempt $i/20 failed, retrying in 3s..."
            sleep 3
          done
          echo "API health check failed after retries."
          docker compose -f docker-compose.prod.yml logs --tail=120 api
          exit 1
