version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-skilluser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skillpass}
      POSTGRES_DB: ${POSTGRES_DB:-skilldb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-skilluser} -d ${POSTGRES_DB:-skilldb}"]
      interval: 10s
      timeout: 5s
      retries: 8

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 8

  api:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: production
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-skilluser}:${POSTGRES_PASSWORD:-skillpass}@db:5432/${POSTGRES_DB:-skilldb}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/tmp/skill-intelligence/uploads
    expose:
      - "8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    depends_on:
      - api
    ports:
      # Bind to localhost and a non-standard host port to avoid clashing
      # with other projects/services running on the same VM.
      - "127.0.0.1:${APP_HOST_PORT:-8088}:80"

volumes:
  pgdata:
  uploads:
